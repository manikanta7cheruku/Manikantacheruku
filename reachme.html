<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE-edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <script defer src="app.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <title>MK - Reach Me</title>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">MKC.7</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="index.html#about">About</a>
          <a class="nav-link" href="social.html">Social</a>
          <a class="nav-link active" aria-current="page" href="reachme.html">Reach Me</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    <section class="section-padding min-vh-100 d-flex align-items-center">
      <div class="container">
        <div class="row">
          <div class="col-12 text-center">
            <h1 class="display-4 fw-semibold">Reach Me</h1>
            <div class="line"></div>
            <p>Feel free to contact me anytime</p>
          </div>
        </div>

        <!-- Contact Info Cards -->
        <div class="row mt-5">
          <div class="col-md-4 text-center mb-4">
            <div class="card p-4">
              <i class="fas fa-envelope fa-3x mb-3"></i>
              <h5>Email</h5>
              <p>yourmail@example.com</p>
              <a href="mailto:yourmail@example.com" class="btn btn-primary">Send Email</a>
            </div>
          </div>

          <div class="col-md-4 text-center mb-4">
            <div class="card p-4">
              <i class="fas fa-phone fa-3x mb-3"></i>
              <h5>Phone</h5>
              <p>+91 9876543210</p>
              <a href="tel:+919876543210" class="btn btn-success">Call Now</a>
            </div>
          </div>

          <div class="col-md-4 text-center mb-4">
            <div class="card p-4">
              <i class="fas fa-map-marker-alt fa-3x mb-3"></i>
              <h5>Location</h5>
              <p>India</p>
              <a href="https://maps.google.com" target="_blank" class="btn btn-danger">View Map</a>
            </div>
          </div>
        </div>

        <!-- Contact Form (Optional) -->
        <div class="row mt-5 justify-content-center">
          <div class="col-md-8">
            <h3 class="text-center mb-4">Send Me a Message</h3>
            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Your Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your name">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Your Email</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Your Message</label>
                <textarea class="form-control" id="message" rows="5" placeholder="Write your message here..."></textarea>
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- SIMPLE FOOTER -->
  <footer class="footer text-center py-3">
    <div class="container">
      <p class="mb-0">© 2024 MKC.7 | The Page is not Completely Done Yet.</p>
    </div>
  </footer>

</body>
</html>
